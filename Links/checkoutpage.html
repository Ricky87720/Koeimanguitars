<!DOCTYPE html>
<html>
    <head>
       <title>https://www.Koeimanguitars.com</title>
      <link rel="stylesheet" href="style.css">
    </head>

<style>
        body {
            background-color: rgb(43, 255, 135);
        }
        .whiteblock {
            width: 400px;
            height: 300px;
            background-color: white;
            margin-top: 100px;
            margin-left: 0px;
            border-radius: 20px;
        }

        p {
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-weight: bold;
            margin-left: 10px;
        }

        
        button {
            display: block;
            margin-left: 10px;
        }

        label {
            color: black;
            margin-top: 0px;
        }

        h4 {
            color: black;
        }

        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .popup-box {
            width: 250px;
            height: 150px;
            background: white;
            border-radius: 10px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .close {
            position: absolute;
            top: 8px;
            right: 10px;
            cursor: pointer;
            font-size: 20px;
            color: black;
        }

        @keyframes fadeIn {
        from { transform: scale(0.8); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
        }

        img {
            height: 50px;
        }

        li a:hover {
            color: white;
            background-color: black;
            border-radius: 5px;
        }

           li a {
            text-decoration: none;
            color: black;
            padding: 0px;
            display: inline-block;
            transition: 0.3s;
           
        }

        h1 {
            margin: 0px;
            margin-top: 0px;
            margin-bottom: 0px;
        }

         li {
            list-style: none;
           }

    </style>
    <h1>Koeiman Guitar's</h1>
    <div class="whiteblock">
        <p id="ordertotal"></p>
<h4>Select payment method</h4>
<label>
  <input type="radio" name="payment" value="paypal">
  PayPal
</label>

<br>

<label>
  <input type="radio" name="payment" value="visa">
  Visa / Credit Card
</label>

<br>

<label>
  <input type="radio" name="payment" value="venmo">
  Venmo
</label>

        <button onclick="buyNow()">Proceed to checkout</button>
<input type="text" class="inputbox" placeholder="Message seller">
<ul>
                    <li><a href="../index.html">Home</a></li>
                   
                </ul>
            </nav>
<script>
document.getElementById("ordertotal").innerText =
"Order Total: " + localStorage.getItem("productPrice");
</script>
    </div>
    <div id="popup" class="popup">
    <div class="popup-box">
        <span class="close" onclick="closePopup()">×</span>
        <img src="../images/confirmed.png" alt="Example image">
        <p>Purchase confirmed!</p>
    </div>
</div>
<script>
function buyNow() {
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>
